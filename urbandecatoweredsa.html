<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UDT Edsa - Google Drive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a365d;
            --secondary: #2d6c8a;
            --accent: #e9b949;
            --light: #f8f9fa;
            --dark: #2d3748;
            --gray: #a0aec0;
            --success: #38a169;
            --danger: #e53e3e;
            --dark-bg: #121212;
            --dark-surface: #1e1e1e;
            --dark-text: #e0e0e0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7f9;
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 20px 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .logo h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .tabs-container {
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            margin: 30px 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.8s ease-out;
            position: relative;
        }
        
        .tabs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            justify-content: center;
        }
        
        .tab-wrapper {
            position: relative;
        }

        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 120px;
            background: white;
            border: 2px solid var(--primary);
            border-radius: 12px;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            padding: 10px;
            width: 100%;
            position: relative;
        }
        
        .tab:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        .tab i {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .tab span {
            font-weight: 600;
            font-size: 13px;
            text-align: center;
        }

        .tab-delete {
            position: absolute;
            top: 6px;
            right: 8px;
            background: rgba(255,0,0,0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: 0.2s;
        }
        .tab-delete:hover {
            background: #c53030;
            transform: scale(1.1);
        }
        .tab-wrapper:hover .tab-delete {
            display: flex;
        }
        .tab-wrapper .tab-delete {
            display: none;
        }

        .add-tab-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 120px;
            background: white;
            border: 2px dashed var(--primary);
            border-radius: 12px;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 10px;
            opacity: 0.7;
        }
        .add-tab-btn:hover {
            opacity: 1;
            background: #eef2f7;
            transform: scale(1.02);
        }
        .add-tab-btn i {
            font-size: 32px;
            margin-bottom: 6px;
        }
        .add-tab-btn span {
            font-weight: 500;
            font-size: 14px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary);
            font-size: 28px;
            font-weight: 700;
            position: relative;
            padding-bottom: 10px;
        }
        
        .section-title:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--accent);
            border-radius: 2px;
        }
        
        .announcement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .announcement-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .announcement-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal, .upload-modal, .login-modal, .tab-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.active, .upload-modal.active, .login-modal.active, .tab-modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content img {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 8px;
        }

        .modal-actions {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px;
        }

        .upload-content, .login-content, .tab-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .login-content { 
            background: var(--dark-surface); 
            color: white; 
            border: 2px solid var(--accent);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-accent { background: var(--accent); color: var(--dark); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline-secondary { background: transparent; border: 1px solid #ccc; color: #333; }
        
        .btn-outline-danger { 
            background: var(--danger); 
            color: white; 
            border: none;
            margin-top: 15px;
        }
        .btn-outline-danger:hover {
            background: #c53030;
        }

        .icon-selector {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin: 12px 0;
            max-height: 160px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
        }
        .icon-selector i {
            font-size: 26px;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            color: var(--primary);
        }
        .icon-selector i:hover {
            background: #edf2f7;
            transform: scale(1.1);
        }
        .icon-selector i.selected {
            border-color: var(--accent);
            background: #fefcbf;
        }

        /* admin code input inside tab modal */
        .admin-code-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        footer {
            background: var(--primary);
            color: white;
            padding: 30px 0;
            margin-top: auto;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .footer-links a { color: white; margin-left: 20px; text-decoration: none; cursor: pointer; }

        .toast {
            position: fixed; bottom: 20px; right: 20px;
            padding: 15px 25px; border-radius: 8px;
            color: white; display: none; z-index: 2000;
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .tabs {
                grid-template-columns: 1fr;
            }
            .tab, .add-tab-btn {
                flex-direction: row;
                height: 60px;
                justify-content: flex-start;
                padding: 0 20px;
            }
            .tab i, .add-tab-btn i {
                margin-bottom: 0;
                margin-right: 20px;
                font-size: 20px;
                width: 25px;
                text-align: center;
            }
            .tab span, .add-tab-btn span {
                font-size: 15px;
                text-align: left;
            }
            .footer-content {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            .footer-links {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .footer-links a {
                margin-left: 0;
            }
            .icon-selector {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo"><h1>UDT Edsa - Google Drive</h1></div>
                <p>Dashboard</p>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="tabs-container">
            <div class="tabs" id="tabsContainer">
                <!-- tabs will be rendered here + add button -->
            </div>
        </div>

        <section>
            <h2 class="section-title">Bulletin Board</h2>
            <div class="announcement-grid" id="announcementGrid"></div>
        </section>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div>Urban Deca Tower Edsa</div>
                <div class="footer-links">
                    <a href="https://www.dgrdi.digital/" target="_blank" rel="noopener noreferrer">More Projects</a>
                    <a id="loginLink">Login</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Image Modal -->
    <div class="modal" id="imageModal">
        <div class="modal-content">
            <img id="modalImage" src="">
            <div class="modal-actions">
                <div class="modal-btn" onclick="openUploadModal()" id="uploadBtnAction" style="display:none;"><i class="fas fa-upload" style="color:var(--primary)"></i></div>
                <div class="modal-btn" onclick="closeModal()"><i class="fas fa-times" style="color:var(--danger)"></i></div>
            </div>
        </div>
    </div>

    <!-- Upload Poster Modal -->
    <div class="upload-modal" id="uploadModal">
        <div class="upload-content">
            <h3>Upload Poster</h3>
            <input type="password" id="adminCode" placeholder="Admin Code" style="width:100%; padding:10px; margin:10px 0;">
            <input type="file" id="posterImage" accept="image/*" style="margin:10px 0;">
            <button class="btn btn-primary" onclick="uploadPoster()">Upload</button>
            <button class="btn" onclick="closeUploadModal()">Cancel</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="login-modal" id="loginModal">
        <div class="login-content">
            <h3><i class="fab fa-google" style="color: var(--accent); margin-right: 10px;"></i>Sign in with Google</h3>
            <p style="margin: 16px 0; color: #ccc;">Use your Google account registered in Firebase</p>
            <button class="btn btn-accent" onclick="handleGoogleLogin()" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                <i class="fab fa-google"></i> Sign in with Google
            </button>
            <button class="btn btn-outline-danger" onclick="closeLoginModal()">Close</button>
        </div>
    </div>

    <!-- Tab Create/Edit Modal -->
    <div class="tab-modal" id="tabModal">
        <div class="tab-content">
            <h3 id="tabModalTitle">Create Tab</h3>
            <input type="text" id="tabName" placeholder="Tab Name" style="width:100%; padding:10px; margin:10px 0;">
            <input type="text" id="tabUrl" placeholder="Tab URL (https://...)" style="width:100%; padding:10px; margin:10px 0;">
            <label style="font-weight: 500;">Choose Icon:</label>
            <div class="icon-selector" id="iconSelector"></div>
            <!-- admin code required for create/delete -->
            <input type="password" id="tabAdminCode" placeholder="Admin Code" class="admin-code-input">
            <button class="btn btn-primary" id="saveTabBtn">Save Tab</button>
            <button class="btn btn-outline-secondary" onclick="closeTabModal()">Cancel</button>
        </div>
    </div>

    <!-- Confirm Delete Modal (now with admin code) -->
    <div class="modal" id="confirmModal">
        <div class="modal-content" style="background: white; padding: 30px; border-radius: 12px; max-width: 400px; text-align: center;">
            <h3>Delete Tab?</h3>
            <p style="margin: 15px 0;">Enter admin code to confirm deletion.</p>
            <input type="password" id="deleteAdminCode" placeholder="Admin Code" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:6px;">
            <button class="btn btn-danger" id="confirmDeleteBtn" style="width: auto; padding: 10px 30px;">Yes, Delete</button>
            <button class="btn btn-outline-secondary" onclick="closeConfirmModal()" style="width: auto; padding: 10px 30px; margin-left: 10px;">Cancel</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBdNGSSfPLBORjVvnJM3IVqxFZByw3iJWM",
            authDomain: "btb-announcement.firebaseapp.com",
            projectId: "btb-announcement",
            storageBucket: "btb-announcement.firebasestorage.app",
            messagingSenderId: "1047737510079",
            appId: "1:1047737510079:web:9add56a0c7375fa0f4be0a",
            databaseURL: "https://btb-announcement-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ICON LIST (FontAwesome 6) - added more icons including social media
        const ICON_LIST = [
            "fas fa-file-powerpoint", "fas fa-map-marked-alt", "fas fa-images", "fas fa-calculator",
            "fas fa-th-list", "fas fa-file-invoice", "fas fa-address-book", "fas fa-home",
            "fas fa-folder", "fas fa-cloud", "fas fa-database", "fas fa-cog",
            "fas fa-user", "fas fa-users", "fas fa-chart-bar", "fas fa-envelope",
            "fas fa-phone", "fas fa-print", "fas fa-download", "fas fa-upload",
            "fas fa-link", "fas fa-external-link-alt", "fas fa-pencil-alt", "fas fa-trash",
            "fas fa-plus", "fas fa-minus", "fas fa-check", "fas fa-times",
            "fas fa-calendar", "fas fa-clock", "fas fa-bell", "fas fa-comment",
            // additional icons
            "fas fa-camera", "fas fa-video", "fas fa-music", "fas fa-headphones",
            "fas fa-gamepad", "fas fa-plane", "fas fa-rocket", "fas fa-globe",
            "fas fa-heart", "fas fa-star", "fas fa-trophy", "fas fa-gift",
            // social media icons
            "fab fa-facebook", "fab fa-twitter", "fab fa-instagram", "fab fa-youtube",
            "fab fa-linkedin", "fab fa-github", "fab fa-whatsapp", "fab fa-telegram",
            "fab fa-tiktok", "fab fa-snapchat", "fab fa-reddit", "fab fa-discord"
        ];

        const DEFAULT_IMAGE = "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjQwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KICA8cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZWRmMmY3Ii8+CiAgPHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIyMCIgZmlsbD0iIzY2NiIgdGV4dC1hbmNob3I9Im1pZGRsZSI+Q0xJQ0sgVE8gVVBMT0FEIFBPU1RFUjwvdGV4dD4KPC9zdmc+";

        let currentImageIndex = null;
        let announcementItems = [];
        let currentTabs = [];
        let editingTabKey = null;
        let deleteTargetKey = null;

        // DOM refs
        const tabsContainer = document.getElementById('tabsContainer');
        const loginLink = document.getElementById('loginLink');
        const toast = document.getElementById('toast');

        // Helpers
        function showToast(msg, success=true) {
            toast.textContent = msg;
            toast.style.backgroundColor = success ? '#38a169' : '#e53e3e';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function openModal(img, idx) {
            currentImageIndex = idx;
            document.getElementById('modalImage').src = img;
            document.getElementById('imageModal').classList.add('active');
            document.getElementById('uploadBtnAction').style.display = auth.currentUser ? 'flex' : 'none';
        }
        function closeModal() { document.getElementById('imageModal').classList.remove('active'); }
        function openUploadModal() { closeModal(); document.getElementById('uploadModal').classList.add('active'); }
        function closeUploadModal() { document.getElementById('uploadModal').classList.remove('active'); }
        function openLoginModal() { document.getElementById('loginModal').classList.add('active'); }
        function closeLoginModal() { document.getElementById('loginModal').classList.remove('active'); }
        function openTabModal(key=null) {
            editingTabKey = key;
            document.getElementById('tabModalTitle').innerText = key ? 'Edit Tab' : 'Create Tab';
            if (key) {
                const tab = currentTabs.find(t => t.key === key);
                if (tab) {
                    document.getElementById('tabName').value = tab.name || '';
                    document.getElementById('tabUrl').value = tab.url || '';
                    // highlight icon
                    document.querySelectorAll('#iconSelector i').forEach(el => el.classList.remove('selected'));
                    if (tab.icon) {
                        document.querySelectorAll('#iconSelector i').forEach(el => {
                            if (el.className === tab.icon) el.classList.add('selected');
                        });
                    }
                }
            } else {
                document.getElementById('tabName').value = '';
                document.getElementById('tabUrl').value = '';
                document.querySelectorAll('#iconSelector i').forEach(el => el.classList.remove('selected'));
            }
            document.getElementById('tabAdminCode').value = '';
            document.getElementById('tabModal').classList.add('active');
        }
        function closeTabModal() { document.getElementById('tabModal').classList.remove('active'); }

        function openConfirmModal(key) {
            deleteTargetKey = key;
            document.getElementById('deleteAdminCode').value = '';
            document.getElementById('confirmModal').classList.add('active');
        }
        function closeConfirmModal() { document.getElementById('confirmModal').classList.remove('active'); }

        // Render icons in selector
        function renderIconSelector() {
            const container = document.getElementById('iconSelector');
            container.innerHTML = '';
            ICON_LIST.forEach(icon => {
                const i = document.createElement('i');
                i.className = icon;
                i.addEventListener('click', () => {
                    document.querySelectorAll('#iconSelector i').forEach(el => el.classList.remove('selected'));
                    i.classList.add('selected');
                });
                container.appendChild(i);
            });
        }
        renderIconSelector();

        // RENDER TABS
        function renderTabs(tabs) {
            tabsContainer.innerHTML = '';
            const user = auth.currentUser;
            tabs.forEach(tab => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tab-wrapper';

                const a = document.createElement('a');
                a.href = tab.url || '#';
                a.target = '_blank';
                a.className = 'tab';
                a.innerHTML = `<i class="${tab.icon || 'fas fa-folder'}"></i><span>${tab.name || 'Tab'}</span>`;
                wrapper.appendChild(a);

                if (user) {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'tab-delete';
                    delBtn.innerHTML = '<i class="fas fa-trash"></i>';
                    delBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        openConfirmModal(tab.key);
                    });
                    wrapper.appendChild(delBtn);
                }

                tabsContainer.appendChild(wrapper);
            });

            // Add "+" button if admin
            if (user) {
                const addBtn = document.createElement('div');
                addBtn.className = 'add-tab-btn';
                addBtn.innerHTML = '<i class="fas fa-plus-circle"></i><span>Add Tab</span>';
                addBtn.addEventListener('click', () => openTabModal(null));
                tabsContainer.appendChild(addBtn);
            }
        }

        // LOAD TABS from Firebase (branch: portal_v4/tabs)
        function loadTabs() {
            database.ref('/portal_v4/tabs').on('value', snap => {
                const data = snap.val() || {};
                const tabs = Object.keys(data).map(key => ({ key, ...data[key] }));
                currentTabs = tabs;
                renderTabs(tabs);
            });
        }

        // SAVE / UPDATE TAB (requires admin code)
        function saveTab() {
            const name = document.getElementById('tabName').value.trim();
            const url = document.getElementById('tabUrl').value.trim();
            const selectedIcon = document.querySelector('#iconSelector i.selected');
            const icon = selectedIcon ? selectedIcon.className : 'fas fa-folder';
            const adminCode = document.getElementById('tabAdminCode').value;

            // Admin code check
            if (adminCode !== '156156') {
                showToast('Invalid admin code. Action denied.', false);
                return;
            }

            if (!name) return showToast('Tab name is required', false);
            if (!url) return showToast('URL is required', false);

            const payload = { name, url, icon };

            if (editingTabKey) {
                database.ref(`/portal_v4/tabs/${editingTabKey}`).update(payload)
                    .then(() => {
                        showToast('Tab updated!');
                        closeTabModal();
                    })
                    .catch(err => showToast(err.message, false));
            } else {
                database.ref('/portal_v4/tabs').push(payload)
                    .then(() => {
                        showToast('Tab created!');
                        closeTabModal();
                    })
                    .catch(err => showToast(err.message, false));
            }
        }

        // DELETE TAB (requires admin code)
        function confirmDelete() {
            const adminCode = document.getElementById('deleteAdminCode').value;
            if (adminCode !== '156156') {
                showToast('Invalid admin code. Deletion denied.', false);
                return;
            }
            if (deleteTargetKey) {
                database.ref(`/portal_v4/tabs/${deleteTargetKey}`).remove()
                    .then(() => {
                        showToast('Tab deleted');
                        closeConfirmModal();
                        deleteTargetKey = null;
                    })
                    .catch(err => showToast(err.message, false));
            }
        }

        // GOOGLE LOGIN - allows any email that is registered in Firebase Auth
        function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    if (user) {
                        // User is authenticated with Firebase Auth
                        // No email blocking - any registered email is allowed
                        showToast('Logged in with Google');
                        closeLoginModal();
                    } else {
                        showToast('Login failed', false);
                    }
                })
                .catch(err => showToast(err.message, false));
        }

        // AUTH STATE
        auth.onAuthStateChanged(user => {
            if (user) {
                loginLink.textContent = 'Logout';
                loginLink.onclick = () => auth.signOut();
                const uploadBtn = document.getElementById('uploadBtnAction');
                if (uploadBtn) uploadBtn.style.display = 'flex';
                renderTabs(currentTabs);
            } else {
                loginLink.textContent = 'Login';
                loginLink.onclick = openLoginModal;
                const uploadBtn = document.getElementById('uploadBtnAction');
                if (uploadBtn) uploadBtn.style.display = 'none';
                renderTabs(currentTabs);
            }
        });

        // BULLETIN BOARD (unchanged)
        function updateItem(idx, data) {
            const grid = document.getElementById('announcementGrid');
            let item = announcementItems[idx];
            if(!item) {
                item = document.createElement('div');
                item.className = 'announcement-item';
                grid.appendChild(item);
                announcementItems[idx] = item;
            }
            item.innerHTML = `<img src="${data}">`;
            item.onclick = () => openModal(data, idx);
        }

        // Upload poster (unchanged)
        async function uploadPoster() {
            const code = document.getElementById('adminCode').value;
            const file = document.getElementById('posterImage').files[0];
            if(code !== '156156') return showToast('Invalid Code', false);
            if(!file) return showToast('Select Image', false);

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                await database.ref('/portal_v4/posters/').update({ [`poster_${currentImageIndex}`]: reader.result });
                showToast('Uploaded!');
                closeUploadModal();
                updateItem(currentImageIndex, reader.result);
            };
        }

        // LOAD posters
        window.onload = () => {
            loadTabs();
            database.ref('/portal_v4/posters/').on('value', snap => {
                const data = snap.val() || {};
                for(let i=0; i<4; i++) {
                    updateItem(i, data[`poster_${i}`] || DEFAULT_IMAGE);
                }
            });
        };

        // Event bindings
        document.getElementById('saveTabBtn').addEventListener('click', saveTab);
        document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);
        // close modals on overlay click
        document.querySelectorAll('.modal, .upload-modal, .login-modal, .tab-modal').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target === el) {
                    el.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
